name: API — test & deploy to Cloud Run

on:
  push:
    branches: [main]
    paths: ["apps/api/**", ".github/workflows/deploy-api.yml"]
  pull_request:
    paths: ["apps/api/**"]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: dice-bet-503309
  GCP_REGION: us-central1
  SERVICE_NAME: dicebet-api
  ARTIFACT_REPO: dicebet # Artifact Registry docker repo name

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - run: npm test

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation — no service account keys
    steps:
      - uses: actions/checkout@v4

      # One-time GCP setup (see README): create a Workload Identity Pool and a
      # deployer service account, then set these two repo secrets.
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push image
        run: |
          IMAGE="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$ARTIFACT_REPO/$SERVICE_NAME:${{ github.sha }}"
          gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet
          docker build -t "$IMAGE" apps/api
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --image "$IMAGE" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 2 \
            --set-secrets "SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest" \
            --set-env-vars "SUPABASE_URL=${{ vars.SUPABASE_URL }},CORS_ORIGINS=${{ vars.CORS_ORIGINS }},CHECKOUT_RETURN_URL=${{ vars.CHECKOUT_RETURN_URL }}"
