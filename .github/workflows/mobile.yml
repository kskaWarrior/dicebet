name: Mobile — Android (Test Lab + Distribution) & iOS (CocoaPods)

on:
  push:
    branches: [main]
    paths: ["apps/web/**", ".github/workflows/mobile.yml"]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: dice-bet-503309
  FIREBASE_ANDROID_APP_ID: "1:317202176199:android:25e96a02fee1cd4156c6e2"

jobs:
  android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm install
      - run: npm run generate -w apps/web
      - run: npx cap sync android
        working-directory: apps/web

      - name: Build debug APK
        working-directory: apps/web/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Run Robo test on Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --project "$GCP_PROJECT_ID" \
            --type robo \
            --app apps/web/android/app/build/outputs/apk/debug/app-debug.apk \
            --results-bucket gs://dice-bet-503309-testlab-results \
            --timeout 120s

      - name: Distribute to testers via App Distribution
        run: |
          npx --yes firebase-tools@latest appdistribution:distribute \
            apps/web/android/app/build/outputs/apk/debug/app-debug.apk \
            --project "$GCP_PROJECT_ID" \
            --app "$FIREBASE_ANDROID_APP_ID" \
            --testers "m.viniciusdiasf@gmail.com,intiagsolutions@gmail.com" \
            --release-notes "${{ github.event.head_commit.message || 'Manual build' }}"

      - uses: actions/upload-artifact@v4
        with:
          name: dicebet-debug-apk
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk

  # Integration test: verify the iOS project resolves and builds with CocoaPods.
  ios-pods:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install
      - run: npm run generate -w apps/web

      # cap sync ios runs `pod install` under the hood on macOS
      - run: npx cap sync ios
        working-directory: apps/web

      - name: Build iOS app (simulator, unsigned)
        working-directory: apps/web/ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            build CODE_SIGNING_ALLOWED=NO
